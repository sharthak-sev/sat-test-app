<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAT Interactive Practice</title>
  <link rel="icon" type="image/png" href="logo.png">
  <meta name="description" content="Take timed, adaptive SAT practice tests with real question bank data. Track performance, review answers, and identify weaknesses — all offline and free.">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <!-- Sentry Error Logging -->
  <script src="https://js.sentry-cdn.com/610da841a6875eae790cbc1fd6ea96b1.min.js" crossorigin="anonymous"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <!-- KaTeX Math Rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <div class="boot-card">
      <div class="loader"></div>
      <p>Loading local practice data…</p>
    </div>
  </div>
  <input id="fileInput" type="file" accept=".sat-test,application/json" hidden>
  <script src="db.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(err => console.error("SW reg failed", err));
      });
    }
  </script>
</body>
</html>
